name: InternOps CI

on:
  push:
    branches: [ master, 'feature/*' ]
  pull_request:
    branches: [ master ]

jobs:
  test:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:14
        env:
          POSTGRES_USER: root
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: root
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    env:
      NODE_ENV: test
      DATABASE_URL: postgresql://root:postgres@localhost:5432/internops_test
      JWT_SECRET: ci-test-secret-do-not-use-in-prod
      PORT: 5000
      CORS_ORIGIN: http://localhost:5173
      REDIS_URL: redis://localhost:6379
      GOOGLE_CLIENT_ID: test-google-client-id
      EMAIL_API_KEY: test-email-api-key

    steps:
      - name: Checkout code
        uses: actions/checkout@v5

      - name: Setup Node.js
        uses: actions/setup-node@v5
        with:
          node-version: 22
          cache: 'npm'
          cache-dependency-path: backend/package-lock.json

      - name: Install backend dependencies
        run: cd backend && npm ci

      # ✅ Force-creates the internops_test target database if the application configuration expects it specifically
      - name: Create fallback testing database
        run: PGPASSWORD=postgres psql -h localhost -U root -d root -c "CREATE DATABASE internops_test;"

      - name: Run migrations
        run: cd backend && npm run migrate
        env:
          PGHOST: localhost

      - name: Seed test data
        run: cd backend && npm run seed
        env:
          PGHOST: localhost

      - name: Run Jest tests
        run: cd backend && npm test -- --forceExit --detectOpenHandles --runInBand
        env:
          PGHOST: localhost

      - name: Install frontend dependencies
        run: cd frontend && npm ci

      - name: Build frontend
        run: cd frontend && npm run build